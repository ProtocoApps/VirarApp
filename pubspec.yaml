name: virar_app_android
description: VIRAR - Soluções que Transformam o Cuidado

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  provider: ^6.1.1
  
  # Navigation
  go_router: ^12.1.0
  
  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.3.0
  supabase_flutter: ^2.3.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  
  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.6
  
  # UI Components
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.0
  
  # Utilities
  equatable: ^2.0.5
  uuid: ^4.2.1
  intl: ^0.20.2
  url_launcher: ^6.2.0
  app_settings: ^5.1.1
  
  # Image Picker
  image_picker: ^1.0.4
  
  # Video Player
  video_player: ^2.8.0
  
  # Rating
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/LOGO app.png"
  adaptive_icon_background: "#1A1614"
  adaptive_icon_foreground: "assets/images/LOGO app.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: Poppins
